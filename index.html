<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leafora | Plant Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="logo">🌱 Leafora</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About Us</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <input type="text" placeholder="Grow what you love 🌿">
        <button>Search</button>
    </section>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Bring Nature Home</h1>
            <p>Fresh indoor & outdoor plants for your space</p>
            <button class="shop-btn">Shop Now</button>
        </div>

        <div class="hero-img">
            <img src="https://images.unsplash.com/photo-1524594154908-edd0d60dbe6d" alt="Plant">
        </div>
    </section>

    <!-- Offers -->
    <section class="offers">
        <h2>🌟 Upcoming Offers</h2>
        <p>Up to <span>40% OFF</span> on selected plants</p>
    </section>

    <!-- Categories -->
    <section class="categories">
        <h2>Shop by Categories</h2>

        <div class="category-box">
            <div class="card">
            <img 
                src="https://cdn.shopify.com/s/files/1/0068/4215/5090/files/How_Do_Plants_Impact_Mental_Health_480x480.jpg?v=1738685469"
                alt="Indoor Plants"
                class="category-img"
            />
            <p>Indoor Plants</p>
        </div>

        <div class="category-box">
            <div class="card">
            <img 
                src="https://potsplantersandmore.com/product_images/uploaded_images/outdoor-potted-plants.jpg"
                alt="Indoor Plants"
                class="category-img"
            />
            <p>outdoor Plants</p>
        </div>
        <div class="category-box">
            <div class="card">
            <img 
                src="https://www.gardendesign.com/pictures/images/675x529Max/site_3/helianthus-yellow-flower-pixabay_11863.jpg"
                alt="Indoor Plants"
                class="category-img"
            />
            <p>Flowers</p>
        </div>
    
            <div class="card">Flowers</div>
            <div class="card">Seeds</div>
            <div class="card">Pots & Tools</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Leafora | Grow with Love 🌱</p>
    </footer>

</body>
</html>
